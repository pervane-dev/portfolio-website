<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pervane | Front-end Developer</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="header">
  <div class="container nav-container">
    <h2 class="logo">Pervane</h2>

    <nav class="nav" id="nav">
      <a href="#home">Home</a>
      <a href="#about">Haqqımda</a>
      <a href="#projects">Layihələr</a>
      <a href="#skills">Bacarıqlar</a>
      <a href="#contact">Əlaqə</a>
    </nav>

    <div class="actions">
      <button id="themeToggle">🌙</button>
      <button class="burger" id="burger">☰</button>
    </div>
  </div>
</header>

<!-- HERO -->
<section id="home" class="hero reveal">
  <div class="container">
    <h1>Salam, mən <span class="highlight">Pervane</span></h1>
    <p>Front-end Developer</p>
    <a href="#projects" class="btn">Layihələr</a>
  </div>
</section>

<!-- ABOUT -->
<section id="about" class="section reveal">
  <div class="container">
    <h2>Haqqımda</h2>
    <p>HTML, CSS, JS və React ilə müasir UI-lar yaradıram.</p>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="section reveal">
  <div class="container grid">
    <div class="card">Weather App</div>
    <div class="card">E-commerce UI</div>
    <div class="card">Portfolio</div>
  </div>
</section>

<!-- SKILLS -->
<section id="skills" class="section reveal">
  <div class="container skills">
    <span>HTML</span>
    <span>CSS</span>
    <span>JS</span>
    <span>React</span>
    <span>Git</span>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section reveal">
  <div class="container">
    <form id="contactForm">
      <input type="text" id="name" placeholder="Ad" required>
      <input type="email" id="email" placeholder="Email" required>
      <textarea id="message" placeholder="Mesaj"></textarea>
      <button type="submit" class="btn">Göndər</button>
    </form>
  </div>
</section>

<footer class="footer">
  © 2026 Pervane
</footer>

<!-- JS -->
<script>
/* =========================
   MOBILE MENU
========================= */
const burger = document.getElementById("burger");
const nav = document.getElementById("nav");

burger.addEventListener("click", () => {
  nav.classList.toggle("active");
});

/* =========================
   DARK MODE
========================= */
const themeToggle = document.getElementById("themeToggle");

themeToggle.addEventListener("click", () => {
  document.body.classList.toggle("dark");

  themeToggle.textContent =
    document.body.classList.contains("dark") ? "☀️" : "🌙";
});

/* =========================
   SMOOTH SCROLL (enhanced)
========================= */
document.querySelectorAll('a[href^="#"]').forEach(link => {
  link.addEventListener("click", e => {
    e.preventDefault();
    const target = document.querySelector(link.getAttribute("href"));
    if (target) {
      target.scrollIntoView({ behavior: "smooth" });
      nav.classList.remove("active");
    }
  });
});

/* =========================
   SCROLL REVEAL
========================= */
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".reveal").forEach(el => observer.observe(el));

/* =========================
   FORM VALIDATION
========================= */
const form = document.getElementById("contactForm");

form.addEventListener("submit", e => {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  if (name.length < 2) {
    alert("Ad çox qısadır");
    return;
  }

  if (!email.includes("@")) {
    alert("Email düzgün deyil");
    return;
  }

  alert("Mesaj göndərildi!");
  form.reset();
});
</script>

</body>
</html>
